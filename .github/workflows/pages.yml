name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "full_catalog.html"
      - "analysis.html"
      - "portfolio.html"
      - "pipeline/*.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site/pipeline
          cp index.html full_catalog.html analysis.html portfolio.html _site/
          cp pipeline/ideas_queue.json pipeline/strategies_queue.json pipeline/status.json _site/pipeline/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
